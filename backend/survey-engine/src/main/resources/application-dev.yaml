server:
  port: 8080

spring:
  application:
    name: survey-engine

  datasource:
    url: jdbc:postgresql://localhost:${MAIN_SURVEY_ENGINE_PORT}/${MAIN_SURVEY_ENGINE_DB}
    username: ${MAIN_SURVEY_ENGINE_ADMIN}
    password: ${MAIN_SURVEY_ENGINE_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      connection-timeout: 20000
      maximum-pool-size: 10
      idle-timeout: 10000
      max-lifetime: 600000

  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: false
    show-sql: false

  flyway:
    locations: classpath:db/migration
    baseline-on-migrate: true
    enabled: true

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${app-security.base-url:http://127.0.0.1:8080}
  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enabled: true
            required: true

  data:
    redis:
      port: 6379
      host: localhost

  rabbitmq:
    host: localhost
    port: 5672
    username: guest
    password: guest
    publisher-confirm-type: correlated
    publisher-returns: true

  # Groq provides an OpenAI-compatible API, allowing us to use the standard Spring AI OpenAI starter.
  # By pointing the base-url to Groq, we leverage their high-speed inference engine using the same client code.
  ai:
    openai:
      api-key: ${GROQ_API_KEY}
      base-url: https://api.groq.com/openai
      chat:
        options:
          model: llama-3.1-8b-instant

app-security:
  base-url: http://localhost:8080
  encryption:
    password: dev_password_do_not_use_in_prod
    salt: 5c074494c856c854 # hex encoded

daraja:
  api:
    base-url: https://sandbox.safaricom.co.ke

safaricom:
  api:
    url: ${SAFARICOM_API_URL}

survey:
  web:
    base-url: http://localhost:5173/s/


jwt:
  keystore:
    path: ${JWT_STORE_PATH}
    password: ${JWT_STORE_PASSWORD}
    alias: ${JWT_STORE_ALIAS}
  expiration: 15           # access token lifetime in minutes
  refresh-expiration-days: 7  # refresh token lifetime in days

cookie:
  secure: ${COOKIE_SECURE:false}

cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:5174,http://localhost:4173,http://127.0.0.1:5173}

app:
  frontend:
    base-url: ${APP_FRONTEND_URL:http://localhost:5173}

paystack:
  api:
    base-url: ${PAYSTACK_BASE_URL}
    secret-key: ${PAYSTACK_TEST_KEY}

africastalking:
  api:
    api-key: ${AFRICASTALKING_API_KEY:username}
    username: ${AFRICASTALKING_USERNAME:12345}

whatsapp:
  api:
    base-url: https://graph.facebook.com/v18.0
    access-token: ${WHATSAPP_ACCESS_TOKEN:access_token}
    phone-number-id: ${WHATSAPP_PHONE_NUMBER_ID:0723929410}

logging:
  level:
    root: INFO
    com.survey.survey: DEBUG

credofaster:
  api:
    base-url: ${CREDOFASTER_BASE_URL:https://api-test.partner.credofaster.co.ke}
    airtime:
      api-key: ${CREDOFASTER_AIRTIME_API_KEY:050619d0-f940-4a81-b56f-06439c4e57a7}
      client-id: ${CREDOFASTER_AIRTIME_CLIENT_ID:Paypot3_AIRTIME}
    data:
      api-key: ${CREDOFASTER_DATA_API_KEY:23d0e61e-f1e4-4e00-9e54-47d51ca49af3}
      client-id: ${CREDOFASTER_DATA_CLIENT_ID:Paypot3_DATA}